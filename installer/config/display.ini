; VoidDisplay configuration. Read by the driver at init; written by voidctl / libvoidrv.
[render]
; 0 = auto, 0x10DE = NVIDIA, 0x1002 = AMD, 0x8086 = Intel
PreferredAdapterVendorId = 0

[cursor]
; 1 = hardware-cursor overlay (no double cursor on remote-desktop apps that draw a
;     client-side pointer), 0 = bake the pointer into the streamed frames
HardwareCursor = 1

[startup]
; 1 = recreate the [displays] below at boot/restart, 0 = start clean
RestoreOnStart = 1

[edid]
; 0 = built-in VoidVDA EDID; 1 = clone display.edid (128/256 bytes) from this folder
UseCustomEdid = 0
; 1 = per-slot serial (multi-display safe); 0 = exact clone (best for one display)
PatchSerial = 1

[modes]
; Extra resolutions beyond the built-ins, comma-separated WxH@Hz. Managed by addmode.
Custom =

[displays]
; Active displays persisted for restore-on-start: <slot> = WxH@Hz. Managed by add/remove/setmode.
